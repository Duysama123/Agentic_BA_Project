name: Supabase Keep-Alive Ping

on:
  schedule:
    # Run at 00:00 every 3 days
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Secrets not found. Please set SUPABASE_URL and SUPABASE_KEY in GitHub repository secrets."
            exit 0
          fi
          
          # Ping the projects table just to register activity (1 byte response)
          echo "Pinging Supabase at $SUPABASE_URL..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$SUPABASE_URL/rest/v1/projects?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Range: 0-0")
            
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 206 ]; then
            echo "Ping complete! HTTP Status: $RESPONSE"
          else
            echo "Ping failed with HTTP Status: $RESPONSE"
          fi
